<template>
    <h2 class="faq-title">Frequently asked questions</h2>

    <p class="faq-count">Showing 1 - {articles.length} of {articles.length} results</p>

    <div class="faq-container">

        <template for:each={articles} for:item="item" for:index="index">
            <div key={item.Id} class="faq-item">

                <!-- HEADER -->
                <div class={item.headerClass} data-index={index} onclick={toggle}>
                        <span class={item.questionClass}>
                        {item.Title}
                    </span>
                    <lightning-icon
                        icon-name={item.iconName}
                        size="small"
                        class="faq-icon">
                    </lightning-icon>
                </div>

                <!-- CONTENT -->
                <div class={item.contentClass}>
                    
                    <div class="faq-content-body">
                        <lightning-formatted-rich-text value={item.Answer__c}>
                        </lightning-formatted-rich-text>

                        <div class="faq-helpful">
                            <span>Was this helpful?</span>

<button
    class="faq-feedback-btn like-btn"
    data-id={item.Id}
    onclick={handleLike}>
    <lightning-icon
        icon-name="utility:like"
        size="small"
        class={item.likeIconClass}>
    </lightning-icon>
</button>

<button
    class="faq-feedback-btn dislike-btn"
    data-id={item.Id}
    onclick={handleDislike}>
    <lightning-icon
        icon-name="utility:dislike"
        size="small"
        class={item.dislikeIconClass}>
    </lightning-icon>
</button>
                        </div>
                    </div>

                </div>

            </div>
        </template>
    </div>
</template>
